<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>A Toayen Card</title>
    <!--
        Short card links look like /c/CODE#key and are rendered by 404.html
        (GitHub Pages serves it for any path without its own page). This
        stub only exists for the bare /c/ path, which means the code went
        missing from the link.
    -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #FAFAF9;
            color: #1A1A1A;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .empty {
            background: white;
            border: 1px solid #EEEEEC;
            border-radius: 14px;
            padding: 40px 28px;
            text-align: center;
            max-width: 430px;
        }
        .empty h1 { font-weight: 300; font-size: 22px; letter-spacing: 1px; margin-bottom: 10px; }
        .empty p { font-size: 14.5px; color: #666; }
        .empty a { color: #666; }
        @media (prefers-color-scheme: dark) {
            body { background: #111; color: #F0F0F0; }
            .empty { background: #1A1A1A; border-color: #2A2A2A; }
            .empty p { color: #888; }
            .empty a { color: #888; }
        }
    </style>
</head>
<body>
    <div class="empty">
        <h1>This card link looks incomplete</h1>
        <p>The link should end with a short code, and this one doesn't. Ask the sender to share their card again from Toayen. <a href="/">Back to toayen.co.uk</a></p>
    </div>
</body>
</html>
